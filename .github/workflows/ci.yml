name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    name: pytest (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Run test suite
        run: pytest -q

  mcp-guidance-smoke:
    name: mcp guidance smoke (no mcp extras)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies without mcp extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mcp guidance smoke test
        run: pytest -q tests/unit/test_phase5_hardening.py::test_mcp_runtime_smoke_or_install_guidance
